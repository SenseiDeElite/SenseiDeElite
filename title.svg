<svg fill="none" viewBox="0 0 520 60" width="520" height="60" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @keyframes gradient-shift {
          0%   { background-position: 0% 50% }
          50%  { background-position: 100% 50% }
          100% { background-position: 0% 50% }
        }
        .title {
          font-family: sans-serif;
          font-size: 40px;
          font-weight: 700;
          color: transparent;
          background-image: linear-gradient(220deg, #00d4ff, #2255cc, #0d2456, #00d4ff);
          background-size: 300% 300%;
          background-clip: text;
          animation: gradient-shift 6s ease infinite;
          white-space: nowrap;
          display: inline-block;
          margin: 0;
          padding: 4px 0;
          line-height: 1.2;
        }
      </style>
      <p class="title">Sensei 先生</p>
    </div>
  </foreignObject>
</svg>
